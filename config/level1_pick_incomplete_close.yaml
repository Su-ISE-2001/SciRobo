name: Level1_pick_incomplete_close

task_type: "pick"
controller_type: "pick"

mode: "collect"

usd_path: "assets/chemistry_lab/lab_001/lab_001.usd"

max_episodes: 100

infer:
  type: "local"
  obs_names: {"camera_1_rgb": 'camera_1_rgb', "camera_2_rgb": 'camera_2_rgb'}
  policy_model_path: ""
  policy_config_path: ""
  normalizer_path: ""
  host: "127.0.0.1"
  port: 8000
  n_obs_steps: 1
  timeout: 30
  max_retries: 3

task:
  max_steps: 800
  # 夹爪闭合不足的异常
  failure_mode: "incomplete_close"
  # 指距 = 物体需求指距 * scale + extra_gap
  incomplete_close_scale: 1.6
  extra_gap: 0.0
  # 指距增量超过该阈值（米）时标记异常截图
  gap_report_threshold: 0.002
  obj_paths:
    - path: "/World/conical_bottle02"
      position_range:
        x: [0.21, 0.36]
        y: [-0.08, 0.08]
        z: [0.80, 0.80]

cameras:
  - prim_path: "/World/Camera1"
    name: "camera_1"
    translation: [2, 0, 2]
    resolution: [256, 256]
    focal_length: 6
    orientation: [0.61237, 0.35355, 0.35355, 0.61237]
    image_type: "rgb"

  - prim_path: "/World/Camera2"
    name: "camera_2"
    translation: [0.1, 0, 2.5]
    resolution: [256, 256]
    focal_length: 6
    orientation: [0.70711, 0, 0, -0.70711]
    image_type: "rgb"

  - prim_path: "/World/Franka/panda_hand/arm_camera"
    name: "camera_3"
    resolution: [256, 256]
    image_type: "rgb"

robot:
  type: "franka"
  position: [-0.4, -0, 0.71]

collector:
  type: "default"
  compression: gzip
  save_dir: 'robot_data'
  max_episodes: 100
  image_format: 'jpg'
  image_quality: 85

hydra:
  run:
    dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}

multi_run:
  run_dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}

