name: Level2_PourLiquid

task_type: "pickpour"
controller_type: "pickpour"

mode: "collect"

# 指定USD路径和目标路径
usd_path: "assets/chemistry_lab/lab_001/lab_001.usd"
target_path: "/World/beaker1"  # 烧杯的路径，目标位置


max_episodes: 100

infer:
  type: "local"
  obs_names: 
    "camera_1_rgb": 'camera_1_rgb'  # 摄像头1的RGB图像
    "camera_2_rgb": 'camera_2_rgb'  # 摄像头2的RGB图像
  policy_model_path: ""  # 如果有，指定政策模型路径
  policy_config_path: ""  # 如果有，指定政策配置路径
  normalizer_path: ""  # 如果有，指定归一化路径
  host: "127.0.0.1"
  port: 8000
  n_obs_steps: 1
  timeout: 30
  max_retries: 3

task:
  max_steps: 1000  # 任务最大步数
  left_pos:
    x: [0.17, 0.32]  # 左侧目标位置的x坐标范围
    y: [-0.35, -0.2]  # y坐标范围
    z: [0.86, 0.86]   # z坐标范围
  obj_paths:
    - path: "/World/beaker2"  # 物体路径
      position_range:
        x: [0.22, 0.37]  # 物体的x坐标范围
        y: [0.0, 0.15]   # y坐标范围
        z: [0.9, 0.9]    # z坐标范围
        

cameras:
  # 摄像头1配置
  - prim_path: "/World/Camera1"
    name: "camera_1"
    translation: [2, -0.1, 2]
    resolution: [256, 256]
    focal_length: 5
    orientation: [0.61237, 0.35355, 0.35355, 0.61237]
    image_type: "rgb"

  # 摄像头2配置
  - prim_path: "/World/Camera2"
    name: "camera_2"
    translation: [0.1, -0.1, 3]
    resolution: [256, 256]
    focal_length: 5
    orientation: [0.70711, 0, 0, -0.70711]
    image_type: "rgb"
    
  # 机器人手臂的摄像头
  - prim_path: "/World/Franka/panda_hand/arm_camera"
    name: "camera_3"
    resolution: [256, 256]
    image_type: "rgb"
    
robot:
  type: "franka"  # 机器人类型为Frank
  position: [-0.4, -0, 0.71]  # 机器人位置

collector:
  type: "default"
  compression: gzip  # 压缩设置，gzip压缩

# Hydra运行配置
hydra:
  run:
    dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}

multi_run:
  run_dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}
