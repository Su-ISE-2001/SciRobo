name: Level1_stir_fail_angle_pick

task_type: "stir"
controller_type: "stir"

mode: "collect"  # "collect" or "infer"

usd_path: "assets/chemistry_lab/lab_003/lab_003.usd"
obj_path: "/World/glass_rod"  
sub_obj_path: "/World/glass_rod/Cylinder"
target_path: "/World/beaker_2"

max_episodes: 150

infer:
  type: "local"
  obs_names: {"camera_1_rgb": 'camera_1_rgb', "camera_2_rgb": 'camera_2_rgb'}
  policy_model_path: ""
  policy_config_path: ""
  normalizer_path: ""
  host: "127.0.0.1"
  port: 8000
  n_obs_steps: 1
  timeout: 30
  max_retries: 3

task:
  max_steps: 1000
  # 失败模式：模拟夹取玻璃棒角度错误（机器人在夹取玻璃棒时使用错误的角度）
  failure_mode: "fail_angle_pick"  # 将在夹取时添加角度偏移，导致夹取角度错误
  # 固定绕夹爪轴旋转角度（度）
  angle_offset_deg: -45.0
  # 如需改回随机/离散，可再启用下列配置：
  # angle_offset_choices_deg: [-40, -20, 0, 20, 40]
  # angle_offset_range_deg: [-40.0, 40.0]
  # 任一轴绝对值超过该阈值即标注异常
  angle_report_threshold_deg: 20.0

cameras_names: ["camera_1", "camera_2", "camera_3"]
cameras:
  - prim_path: "/World/Camera1"
    name: "camera_1"
    translation: [2, 0, 2]
    resolution: [256, 256]
    focal_length: 4
    orientation: [0.61237, 0.35355, 0.35355, 0.61237]
    image_type: "rgb" 

  - prim_path: "/World/Camera2"
    name: "camera_2"
    translation: [0.1, 0, 2.5]
    resolution: [256, 256]
    focal_length: 4
    orientation: [0.70711, 0, 0, -0.70711]
    image_type: "rgb"
    
  - prim_path: "/World/Franka/panda_hand/arm_camera"
    name: "camera_3"
    resolution: [256, 256]
    image_type: "rgb"
robot:
  type: "franka"
  position: [-0.4, -0, 0.71]

collector:
  type: "default"
  compression: gzip  

hydra:
  run:
    dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}

multi_run:
  run_dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}

