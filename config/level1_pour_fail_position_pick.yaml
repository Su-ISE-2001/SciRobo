name: Level1_pour_fail_position_pick

task_type: "pickpour"
controller_type: "pour"

mode: "collect"

usd_path: "assets/chemistry_lab/lab_001/lab_001.usd"
target_path: "/World/beaker1"

max_episodes: 100

infer:
  type: "local"
  obs_names: {"camera_1_rgb": 'camera_1_rgb', "camera_2_rgb": 'camera_2_rgb'}
  policy_model_path: ""
  policy_config_path: ""
  normalizer_path: ""
  host: "127.0.0.1"
  port: 8000
  n_obs_steps: 1
  timeout: 30
  max_retries: 3

task:
  max_steps: 1500
  # 失败模式：模拟夹取位置错误（机器人在夹取时使用错误的位置）
  failure_mode: "fail_position_pick"  # 将在夹取位置添加偏移，导致夹取失败
  # 位置偏移量（米），支持两种格式：
  # - 固定值：例如 0.1 表示固定偏移量 0.1 米，但方向在XY平面随机
  # - 随机范围：例如 [0.05, 0.15] 表示每次从 0.05 到 0.15 米之间随机选择偏移量大小，方向在XY平面随机
  position_offset: 0.3  # 固定偏移量（米），方向随机
  left_pos:
    x: [0.18, 0.33]
    y: [-0.32, -0.17]
    z: [0.83, 0.83]
  obj_paths:
    - path: "/World/beaker2"
      position_range:
        x: [0.22, 0.37]
        y: [0.0, 0.15]
        z: [0.83, 0.83]
        
cameras:
  - prim_path: "/World/Camera1"
    name: "camera_1"
    translation: [2, -0.1, 2]
    resolution: [256, 256]
    focal_length: 5
    orientation: [0.61237, 0.35355, 0.35355, 0.61237]
    image_type: "rgb"

  - prim_path: "/World/Camera2"
    name: "camera_2"
    translation: [0.1, -0.1, 3]
    resolution: [256, 256]
    focal_length: 5
    orientation: [0.70711, 0, 0, -0.70711]
    image_type: "rgb"

  - prim_path: "/World/Franka/panda_hand/arm_camera"
    name: "camera_3"
    resolution: [256, 256]
    image_type: "rgb"

robot:
  type: "franka"
  position: [-0.4, -0, 0.71]

collector:
  type: "default"
  compression: gzip

hydra:
  run:
    dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}

multi_run:
  run_dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}

