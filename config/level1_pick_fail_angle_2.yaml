name: Level1_pick_fail_angle

task_type: "pick"
controller_type: "pick"

mode: "collect"

usd_path: "assets/chemistry_lab/lab_001/lab_001.usd"

max_episodes: 1

infer:
  type: "local"
  obs_names: {"camera_1_rgb": 'camera_1_rgb', "camera_2_rgb": 'camera_2_rgb'}
  policy_model_path: ""
  policy_config_path: ""
  normalizer_path: ""
  host: "127.0.0.1"
  port: 8000
  n_obs_steps: 150
  timeout: 30
  max_retries: 3

task:
  max_steps: 800
  # 关键：启用角度偏差异常并调节偏差大小与上报阈值
  failure_mode: "fail_angle"
  # 固定绕夹爪轴旋转角度（度）
  angle_offset_deg: 60.0
  # 如需改回随机/离散，可再启用下列配置：
  # angle_offset_choices_deg: [-40, -20, 0, 20, 40]
  # angle_offset_range_deg: [-40.0, 40.0]
  # 任一轴绝对值超过该阈值即标注异常
  obj_paths:
    - path: "/World/conical_bottle02"
      position_range:
        x: [0.21, 0.36]
        y: [-0.08, 0.08]
        z: [0.80, 0.80]

cameras:
  - prim_path: "/World/Camera1"
    name: "camera_1"
    translation: [2, 0, 2]
    resolution: [256, 256]
    focal_length: 6
    orientation: [0.61237, 0.35355, 0.35355, 0.61237]
    image_type: "rgb"

  - prim_path: "/World/Camera2"
    name: "camera_2"
    translation: [0.1, 0, 2.5]
    resolution: [256, 256]
    focal_length: 6
    orientation: [0.70711, 0, 0, -0.70711]
    image_type: "rgb"

  - prim_path: "/World/Franka/panda_hand/arm_camera"
    name: "camera_3"
    resolution: [256, 256]
    image_type: "rgb"

robot:
  type: "franka"
  position: [-0.4, -0, 0.71]

collector:
  type: "default"
  compression: gzip
  save_dir: 'robot_data'
  max_episodes: 150
  image_format: 'jpg'
  image_quality: 85

hydra:
  run:
    dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}

multi_run:
  run_dir: outputs/${mode}/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}

